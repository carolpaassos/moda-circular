services:
  mongodb:
    image: mongo:7.0
    container_name: moda-circular-mongodb
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
      MONGO_INITDB_DATABASE: ModaCircularDb
    volumes:
      - mongodb_data:/data/db

volumes:
  mongodb_data: